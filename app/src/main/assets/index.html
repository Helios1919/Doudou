<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Doudou AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--primary-dark:#E85A24;--primary-light:#FFF0E8;--bg:#F5F5F5;--surface:#FFFFFF;--text:#1A1A2E;--text2:#4A4A68;--text3:#9E9E9E;--border:#E8E8E8;--success:#4CAF50;--error:#F44336;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:16px;--radius-sm:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0}
.header-title{color:#fff;font-size:18px;font-weight:700;letter-spacing:.5px}
.header-actions{display:flex;gap:4px}
.icon-btn{width:40px;height:40px;border:none;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:20px;transition:background .2s}
.icon-btn:active{background:rgba(255,255,255,.25)}
.search-toggle.active{background:rgba(255,255,255,.35);box-shadow:0 0 8px rgba(255,255,255,.3)}

/* Chat Area */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Welcome */
.welcome{text-align:center;padding:32px 16px;animation:fadeIn .4s ease}
.welcome-icon{font-size:56px;margin-bottom:12px}
.welcome h2{font-size:20px;color:var(--text);margin-bottom:6px;font-weight:700}
.welcome p{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.sug-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.sug-chip:active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* Messages */
.msg{display:flex;gap:10px;animation:slideUp .3s ease;max-width:100%}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.ai .msg-avatar{background:var(--primary-light);color:var(--primary)}
.msg.user .msg-avatar{background:var(--primary);color:#fff}
.msg-bubble{max-width:80%;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.6;word-break:break-word}
.msg.ai .msg-bubble{background:var(--surface);color:var(--text);box-shadow:var(--shadow);border-top-left-radius:4px}
.msg.user .msg-bubble{background:var(--primary);color:#fff;border-top-right-radius:4px}
.msg-time{font-size:11px;color:var(--text3);margin-top:4px;padding:0 4px}

/* Typing */
.typing{display:flex;gap:10px;align-items:center;padding:4px 0}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:8px;height:8px;background:var(--text3);border-radius:50%;animation:typingBounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

/* Input */
.input-bar{background:var(--surface);padding:10px 16px;display:flex;align-items:flex-end;gap:10px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-bar textarea{flex:1;border:none;background:var(--bg);border-radius:24px;padding:12px 18px;font-size:14px;resize:none;max-height:120px;outline:none;font-family:inherit;line-height:1.4;color:var(--text)}
.input-bar textarea::placeholder{color:var(--text3)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--primary);border:none;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.send-btn:active{transform:scale(.95);background:var(--primary-dark)}
.send-btn:disabled{background:var(--border);color:var(--text3)}

/* Settings Panel */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;animation:fadeIn .2s ease}
.overlay.show{display:flex;align-items:flex-end}
.panel{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:8px 0 24px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 16px}
.panel-title{font-size:17px;font-weight:700;padding:0 20px;margin-bottom:16px;color:var(--text)}
.panel-section{padding:0 20px;margin-bottom:16px}
.panel-label{font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.panel-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;font-size:14px;color:var(--text);outline:none;background:var(--bg);transition:border .2s}
.panel-input:focus{border-color:var(--primary)}
.panel-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:8px}
.panel-btn.primary{background:var(--primary);color:#fff}
.panel-btn.primary:active{background:var(--primary-dark)}
.panel-btn.secondary{background:var(--bg);color:var(--text2)}
.panel-btn.secondary:active{background:var(--border)}
.panel-status{font-size:13px;text-align:center;padding:4px 0;font-weight:500}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes typingBounce{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-title">Doudou AI</span>
  <div class="header-actions">
    <button class="icon-btn" onclick="openSettings()" title="设置">⚙</button>
    <button class="icon-btn" onclick="clearChat()" title="清空">↻</button>
  </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>你好，我是Doudou AI</h2>
    <p>我可以帮你搜索话题、人物或博主资讯，<br>也可以直接和我聊天</p>
    <div class="suggestions">
      <span class="sug-chip" onclick="sendSuggestion('最近有什么热门话题')">🔥 热门话题</span>
      <span class="sug-chip" onclick="sendSuggestion('推荐几个科技博主')">📱 科技博主</span>
      <span class="sug-chip" onclick="sendSuggestion('AI最新动态')">🤖 AI动态</span>
      <span class="sug-chip" onclick="sendSuggestion('新能源车发展趋势')">🚗 新能源车</span>
    </div>
  </div>
</div>

<!-- Typing Indicator -->
<div class="typing" id="typing" style="display:none;padding:0 16px">
  <div class="msg-avatar" style="background:var(--primary-light);color:var(--primary)">🤖</div>
  <div class="typing-dots"><span></span><span></span><span></span></div>
</div>

<!-- Input Bar -->
<div class="input-bar">
  <textarea id="input" placeholder="输入你想了解的内容..." rows="1" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>

<!-- Settings Overlay -->
<div class="overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <div class="panel-title">设置</div>
    <div class="panel-section">
      <div class="panel-label">API 密钥</div>
      <input class="panel-input" id="apiKeyInput" type="password" placeholder="输入API密钥" value="••••••••">
    </div>
    <div class="panel-section">
      <div class="panel-label">模型</div>
      <input class="panel-input" id="modelInput" placeholder="doubao-pro-32k" value="doubao-pro-32k">
    </div>
    <div class="panel-section">
      <button class="panel-btn primary" onclick="saveSettings()">保存设置</button>
      <button class="panel-btn secondary" onclick="testConnection()">测试连接</button>
      <div class="panel-status" id="statusText"></div>
    </div>
    <div class="panel-section" style="text-align:center">
      <span style="font-size:12px;color:var(--text3)">Doudou AI v2.0 · 纯前端智能体</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== State ====================
const chatArea = document.getElementById('chatArea');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const typing = document.getElementById('typing');
const welcome = document.getElementById('welcome');
const toast = document.getElementById('toast');

let messages = [];
let isProcessing = false;
let searchEnabled = false;

// ==================== Native Bridge Callbacks ====================
function handleNativeCallback(callbackName, data) {
  try {
    switch(callbackName) {
      case 'onApiSuccess':
        onApiSuccess(data);
        break;
      case 'onApiError':
        onApiError(data);
        break;
      case 'onGetSettingsResult':
        onGetSettingsResult(data);
        break;
      case 'onTestConnectionResult':
        onTestConnectionResult(data);
        break;
      case 'onSearchResult':
        onSearchResult(data);
        break;
      default:
        console.warn('Unknown callback:', callbackName);
    }
  } catch (e) {
    console.error('Callback error:', e);
  }
}

// ==================== Input ====================
input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim();
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ==================== Messages ====================
function addMessage(role, content) {
  messages.push({ role, content, time: new Date() });
  welcome.style.display = 'none';
  
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div>
      <div class="msg-bubble">${escapeHtml(content)}</div>
      <div class="msg-time">${formatTime(new Date())}</div>
    </div>
  `;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function showTyping() {
  isProcessing = true;
  typing.style.display = 'flex';
  scrollBottom();
}

function hideTyping() {
  isProcessing = false;
  typing.style.display = 'none';
}

function scrollBottom() {
  setTimeout(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 50);
}

// ==================== Send ====================
function toggleSearch() {
  searchEnabled = !searchEnabled;
  const btn = document.getElementById('searchToggle');
  if (searchEnabled) {
    btn.classList.add('active');
    btn.textContent = '🌐';
    showToast('联网搜索已开启');
  } else {
    btn.classList.remove('active');
    btn.textContent = '🌐';
    showToast('联网搜索已关闭');
  }
}

function sendSuggestion(text) {
  input.value = text;
  sendBtn.disabled = false;
  sendMessage();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isProcessing) return;
  
  isProcessing = true;
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  
  addMessage('user', text);
  hideWelcome();
  showTyping();
  
  try {
    if (window.AndroidBridge) {
      if (searchEnabled) {
        // 联网搜索模式：先搜索，再调用AI
        window.AndroidBridge.searchWeb(text);
      } else {
        const msgList = buildMessageList();
        window.AndroidBridge.callAPI(JSON.stringify(msgList));
      }
    } else {
      throw new Error('无法连接到API服务');
    }
  } catch (err) {
    hideTyping();
    addMessage('ai', '抱歉，请求出错了：' + err.message);
    isProcessing = false;
    sendBtn.disabled = false;
  }
}

function onSearchResult(data) {
  try {
    const result = JSON.parse(data);
    const msgList = buildMessageListWithSearch(result);
    window.AndroidBridge.callAPI(JSON.stringify(msgList));
  } catch (e) {
    // 搜索失败，回退到普通模式
    const msgList = buildMessageList();
    window.AndroidBridge.callAPI(JSON.stringify(msgList));
  }
}

function buildMessageListWithSearch(searchResult) {
  const msgList = [];
  let searchContext = '';
  
  if (searchResult.abstract) {
    searchContext += '【网络搜索结果摘要】\n' + searchResult.abstract;
    if (searchResult.abstractUrl) {
      searchContext += '\n来源: ' + searchResult.abstractUrl;
    }
    searchContext += '\n\n';
  }
  
  if (searchResult.topics && searchResult.topics.length > 0) {
    searchContext += '【相关搜索结果】\n';
    for (let i = 0; i < searchResult.topics.length; i++) {
      const t = searchResult.topics[i];
      searchContext += (i + 1) + '. ' + t.text + '\n';
      if (t.url) searchContext += '   链接: ' + t.url + '\n';
    }
    searchContext += '\n';
  }
  
  if (searchContext) {
    searchContext += '请根据以上实时搜索结果，用简洁清晰的中文回答用户的问题。';
  } else {
    searchContext = '你是一个友好的AI助手，名叫Doudou。请用简洁清晰的中文回答用户问题。回答要友好、有帮助。';
  }
  
  msgList.push({ role: 'system', content: searchContext });
  
  const recent = messages.slice(-10);
  for (const m of recent) {
    msgList.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content });
  }
  return msgList;
}

function onApiSuccess(content) {
  hideTyping();
  addMessage('ai', content);
  isProcessing = false;
  sendBtn.disabled = false;
}

function onApiError(message) {
  hideTyping();
  addMessage('ai', '抱歉，请求出错了：' + message);
  isProcessing = false;
  sendBtn.disabled = false;
}

function hideWelcome() {
  if (welcome.style.display !== 'none') {
    welcome.style.display = 'none';
  }
}

function buildMessageList() {
  const msgList = [];
  msgList.push({ role: 'system', content: '你是一个友好的AI助手，名叫Doudou。请用简洁清晰的中文回答用户问题。回答要友好、有帮助。' });
  const recent = messages.slice(-10);
  for (const m of recent) {
    msgList.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content });
  }
  return msgList;
}

// ==================== Settings ====================
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
  // Load saved settings
  if (window.AndroidBridge) {
    window.AndroidBridge.getSettings();
  }
}

function onGetSettingsResult(json) {
  const s = JSON.parse(json);
  document.getElementById('apiKeyInput').value = s.apiKey || '';
  document.getElementById('modelInput').value = s.model || 'doubao-pro-32k';
}

function closeSettings(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('settingsOverlay').classList.remove('show');
  document.getElementById('statusText').textContent = '';
}

function saveSettings() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const model = document.getElementById('modelInput').value.trim();
  
  if (window.AndroidBridge) {
    window.AndroidBridge.saveSettings(apiKey, model);
    showToast('设置已保存');
    document.getElementById('statusText').textContent = '';
  }
  closeSettings();
}

function testConnection() {
  const status = document.getElementById('statusText');
  status.textContent = '测试中...';
  status.style.color = 'var(--text2)';
  
  if (window.AndroidBridge) {
    window.AndroidBridge.testConnection();
  } else {
    status.textContent = '无法连接';
    status.style.color = 'var(--error)';
  }
}

// Java回调函数
function onTestConnectionResult(result) {
  const status = document.getElementById('statusText');
  if (result === 'ok') {
    status.textContent = '连接成功 ✓';
    status.style.color = 'var(--success)';
  } else {
    status.textContent = '连接失败: ' + result;
    status.style.color = 'var(--error)';
  }
}

function clearChat() {
  if (isProcessing) return;
  messages = [];
  chatArea.innerHTML = '';
  chatArea.appendChild(welcome);
  welcome.style.display = '';
  showToast('聊天已清空');
}

// ==================== Helpers ====================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g, '<br>');
}

function formatTime(date) {
  return date.getHours().toString().padStart(2,'0') + ':' + date.getMinutes().toString().padStart(2,'0');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Init
sendBtn.disabled = true;
</script>
</body>
</html>
